version: '3.7'

services:
  {dbName}:
    image: mongo:4.4
    command: mongod --port {dbPort}
    volumes:
      - mongo-storage:/data/db
    expose:
      - {dbPort}
    ports:
      - {dbPort}:{dbPort}
    network_mode: "host"
  backend:
    build:
      context: ./
      dockerfile: {dockerfile}
    environment:
      - RUN_MODE={RUN_MODE}
      - SENDGRID_API_KEY=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
#    image: label-image
    ports:
      - {serverPort}:{serverPort}
      - {clientPort}:{clientPort}
    network_mode: "host"
    depends_on:
      - {dbName}

volumes:
  mongo-storage:
    driver: local
    name: label-mongo-storage
